<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instructor Dashboard — StuckPoint</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="instructor-page">

<!-- Login Screen -->
<div id="login-screen" class="full-screen-center">
  <div class="modal">
    <div class="modal-logo">📍</div>
    <h2>Instructor Dashboard</h2>
    <p class="modal-subtitle">Monitor student progress in real time.</p>
    <form id="login-form">
      <div class="form-group">
        <label for="instructor-password">Password</label>
        <input type="password" id="instructor-password" placeholder="Enter instructor password" required />
        <div class="form-error hidden" id="login-error">Incorrect password. Try again.</div>
      </div>
      <button type="submit" class="btn-primary btn-full">Sign In →</button>
    </form>
    <div style="margin-top:12px; text-align:center;">
      <a href="/" class="btn-ghost btn-sm">← Back to Student View</a>
    </div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">
  <header class="instructor-header">
    <div class="header-left">
      <span class="logo">📍 StuckPoint</span>
      <span class="header-subtitle">Instructor Dashboard</span>
    </div>
    <div class="header-right">
      <span class="refresh-indicator" id="refresh-indicator">● Live</span>
      <button class="btn-ghost btn-sm" onclick="instructorLogout()">Sign Out</button>
    </div>
  </header>

  <div class="dashboard-body">
    <div class="dashboard-top">
      <h2>Students Struggling in Last 24 Hours</h2>
      <p class="dashboard-subtitle">Sorted by stuck count. Auto-refreshes every 60 seconds.</p>
    </div>

    <div id="students-grid" class="students-grid">
      <div class="loading-state">Loading student data…</div>
    </div>
  </div>
</div>

<!-- Transcript Drawer -->
<div id="transcript-drawer" class="drawer hidden">
  <div class="drawer-header">
    <div>
      <h3 id="drawer-title">Session Transcript</h3>
      <div id="drawer-subtitle" class="drawer-subtitle"></div>
    </div>
    <button class="btn-icon" onclick="closeDrawer()">✕</button>
  </div>
  <div id="drawer-transcript" class="transcript-view"></div>
  <div class="drawer-actions">
    <button class="btn-primary" id="encourage-btn" onclick="sendEncouragement()">
      💬 Send Encouragement
    </button>
    <span id="encourage-status" class="encourage-status"></span>
  </div>
</div>
<div id="drawer-overlay" class="overlay-bg hidden" onclick="closeDrawer()"></div>

<script src="/static/app.js"></script>
<script>
  initInstructorPage();
</script>
</body>
</html>
